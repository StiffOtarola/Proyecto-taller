<ion-header [translucent]="true">
  <ion-toolbar color="primary">
    <ion-title>Proyecto Taller</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content [fullscreen]="true" class="ion-padding">
  <!-- Formulario de alta / edicion -->
  <ion-card>
    <ion-card-header>
      <ion-card-title>{{ editandoId === null ? 'Nuevo item' : 'Editar item' }}</ion-card-title>
    </ion-card-header>
    <ion-card-content>
      <ion-item>
        <ion-input
          label="Nombre"
          labelPlacement="floating"
          [(ngModel)]="form.nombre"
          placeholder="Ej: Cambio de aceite"
        ></ion-input>
      </ion-item>
      <ion-item>
        <ion-textarea
          label="Descripcion"
          labelPlacement="floating"
          [(ngModel)]="form.descripcion"
          [autoGrow]="true"
        ></ion-textarea>
      </ion-item>

      <div class="botones">
        <ion-button expand="block" (click)="guardar()">
          {{ editandoId === null ? 'Crear' : 'Guardar cambios' }}
        </ion-button>
        <ion-button
          *ngIf="editandoId !== null"
          expand="block"
          fill="outline"
          color="medium"
          (click)="cancelarEdicion()"
        >
          Cancelar
        </ion-button>
      </div>
    </ion-card-content>
  </ion-card>

  <!-- Estados -->
  <div *ngIf="cargando" class="ion-text-center ion-padding">
    <ion-spinner></ion-spinner>
  </div>

  <ion-text color="danger" *ngIf="error">
    <p class="ion-text-center">{{ error }}</p>
    <ion-button expand="block" fill="clear" (click)="cargar()">Reintentar</ion-button>
  </ion-text>

  <!-- Lista -->
  <ion-list *ngIf="!cargando && !error">
    <ion-item-sliding *ngFor="let item of items">
      <ion-item>
        <ion-label>
          <h2>{{ item.nombre }}</h2>
          <p>{{ item.descripcion }}</p>
        </ion-label>
      </ion-item>
      <ion-item-options side="end">
        <ion-item-option color="primary" (click)="editar(item)">Editar</ion-item-option>
        <ion-item-option color="danger" (click)="eliminar(item)">Eliminar</ion-item-option>
      </ion-item-options>
    </ion-item-sliding>

    <ion-item *ngIf="items.length === 0">
      <ion-label class="ion-text-center" color="medium">No hay items todavia</ion-label>
    </ion-item>
  </ion-list>
</ion-content>
