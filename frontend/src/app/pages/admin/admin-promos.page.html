<ion-header>
  <ion-toolbar class="admin-topbar">
    <ion-buttons slot="start"><ion-menu-button></ion-menu-button></ion-buttons>
    <ion-title>Promociones</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content class="admin-dark">
  <div class="admin">
    <div class="g2">
      <!-- Crear / editar -->
      <div class="cd">
        <span class="cd-title">{{ editId ? '✏️ Editar promoción' : '🎁 Crear promoción' }}</span>
        <div class="fg"><label>Título *</label><input [(ngModel)]="form.titulo" placeholder="Ej: 20% en cambio de aceite"></div>
        <div class="fg"><label>Descripción *</label><textarea [(ngModel)]="form.descripcion" placeholder="Detalle, condiciones y vigencia…"></textarea></div>
        <div class="fg-row">
          <div class="fg"><label>Descuento (%)</label><input type="number" min="0" max="100" [(ngModel)]="form.descuento" placeholder="20"></div>
          <div class="fg"><label>Precio final (₡)</label><input type="number" min="0" [(ngModel)]="form.precio_final" placeholder="36000"></div>
        </div>
        <div class="fg">
          <label>Imagen de la promoción</label>
          <div class="upload-box" (click)="fileInput.click()">
            <input #fileInput type="file" accept="image/*" hidden (change)="onFile($event)">
            <img *ngIf="form.imagen" [src]="form.imagen" alt="">
            <ng-container *ngIf="!form.imagen"><div class="up-ico">📷</div><div class="up-txt">Clic para subir imagen</div></ng-container>
          </div>
        </div>
        <div class="fg" style="display:flex;align-items:center;gap:10px;margin-bottom:16px">
          <input type="checkbox" id="activa-now" [(ngModel)]="form.activa" style="width:auto;margin:0">
          <label for="activa-now" style="text-transform:none;letter-spacing:0;color:var(--tx);margin:0;cursor:pointer">Activar promoción</label>
        </div>
        <button class="btn btn-cr btn-block" (click)="guardar()" [disabled]="!valido || guardando">{{ guardando ? 'Guardando…' : (editId ? '💾 Guardar cambios' : '💾 Guardar promoción') }}</button>
        <button class="btn btn-ou btn-block" style="margin-top:8px" *ngIf="editId" (click)="cancelar()">Cancelar edición</button>
      </div>

      <!-- Lista -->
      <div>
        <span class="cd-title">📋 Promociones</span>
        <div *ngIf="cargando" style="display:flex;flex-direction:column;gap:10px">
          <div class="sk-dark" style="height:120px"></div>
          <div class="sk-dark" style="height:120px"></div>
        </div>
        <div class="promo-grid" *ngIf="!cargando">
          <div class="promo-card" *ngFor="let p of promos" [class.inactiva]="!p.activa">
            <img *ngIf="p.imagen" [src]="p.imagen" alt="" class="promo-img">
            <div class="promo-img-ph" *ngIf="!p.imagen">🎁</div>
            <div class="promo-body">
              <div class="promo-head">
                <h4>{{ p.titulo }}</h4>
                <span class="bg" [ngClass]="p.activa ? 'bg-em' : 'bg-rd'">{{ p.activa ? 'Activa' : 'Inactiva' }}</span>
              </div>
              <p>{{ p.descripcion }}</p>
              <div class="promo-foot">
                <span class="promo-price" *ngIf="p.precio_final">{{ p.precio_final | currency:'CRC':'symbol-narrow':'1.0-0' }}</span>
                <span class="bg bg-cr" *ngIf="!p.precio_final && p.descuento">-{{ p.descuento }}%</span>
                <div class="promo-btns">
                  <button class="btn btn-ou btn-sm" (click)="editar(p)">✏️ Editar</button>
                  <button class="btn btn-sm" [ngClass]="p.activa ? 'btn-am' : 'btn-em'" (click)="toggle(p)">{{ p.activa ? '⏸' : '▶' }}</button>
                  <button class="btn btn-rd btn-sm" (click)="borrar(p)">🗑</button>
                </div>
              </div>
            </div>
          </div>
          <div class="empty" *ngIf="!promos.length"><ion-icon name="pricetags-outline"></ion-icon><p>Sin promociones.</p></div>
        </div>
      </div>
    </div>
  </div>
</ion-content>
