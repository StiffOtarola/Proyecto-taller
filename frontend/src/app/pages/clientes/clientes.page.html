<ion-header>
  <ion-toolbar color="primary">
    <ion-title>Clientes</ion-title>
    <ion-buttons slot="end">
      <ion-button (click)="nuevoCliente()">
        <ion-icon slot="icon-only" name="add-circle-outline"></ion-icon>
      </ion-button>
    </ion-buttons>
  </ion-toolbar>
  <ion-toolbar>
    <ion-searchbar [(ngModel)]="busqueda" (ionInput)="buscar($event)"
      placeholder="Buscar por nombre, teléfono o cédula" debounce="400">
    </ion-searchbar>
  </ion-toolbar>
</ion-header>

<ion-content>
  <ion-refresher slot="fixed" (ionRefresh)="cargar(); $event.target.complete()">
    <ion-refresher-content></ion-refresher-content>
  </ion-refresher>

  <div class="ion-padding ion-text-center" *ngIf="cargando">
    <ion-spinner></ion-spinner>
  </div>

  <ion-list *ngIf="!cargando">
    <ion-item-sliding *ngFor="let c of clientes">
      <ion-item (click)="abrirDetalle(c.id!)" detail="true" button>
        <ion-avatar slot="start">
          <ion-icon name="person-circle-outline" style="font-size:40px;color:var(--ion-color-primary)"></ion-icon>
        </ion-avatar>
        <ion-label>
          <h2>{{ c.nombre }} {{ c.apellido }}</h2>
          <p>{{ c.telefono }}</p>
          <p *ngIf="c.cedula">CI: {{ c.cedula }}</p>
        </ion-label>
      </ion-item>
      <ion-item-options side="end">
        <ion-item-option (click)="editarCliente(c.id!)">
          <ion-icon name="create-outline"></ion-icon>
        </ion-item-option>
      </ion-item-options>
    </ion-item-sliding>

    <ion-item *ngIf="clientes.length === 0 && !cargando">
      <ion-label class="ion-text-center" color="medium">
        <p>No se encontraron clientes</p>
      </ion-label>
    </ion-item>
  </ion-list>

  <ion-fab vertical="bottom" horizontal="end" slot="fixed">
    <ion-fab-button color="primary" (click)="nuevoCliente()">
      <ion-icon name="add"></ion-icon>
    </ion-fab-button>
  </ion-fab>
</ion-content>
