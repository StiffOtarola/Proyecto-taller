<ion-content class="login-content">
  <div class="login-container">
    <div class="login-header">
      <div class="logo-wrapper">
        <span class="logo-cross">
          <ion-icon name="build" class="ico-wrench"></ion-icon>
          <ion-icon name="hammer" class="ico-hammer"></ion-icon>
        </span>
      </div>
      <h1>TallerMS</h1>
      <p>Sistema de Gestión de Taller</p>
    </div>

    <ion-card>
      <ion-card-content>
        <ion-item lines="full">
          <ion-label position="stacked">Correo</ion-label>
          <ion-input
            type="email"
            [(ngModel)]="email"
            placeholder="admin@taller.com"
            (keyup.enter)="login()">
          </ion-input>
        </ion-item>

        <ion-item lines="none">
          <ion-label position="stacked">Contraseña</ion-label>
          <ion-input
            type="password"
            [(ngModel)]="password"
            placeholder="••••••••"
            (keyup.enter)="login()">
          </ion-input>
        </ion-item>

        <ion-button expand="block" (click)="login()">
          Ingresar
          <ion-icon name="arrow-forward-outline" slot="end"></ion-icon>
        </ion-button>
      </ion-card-content>
    </ion-card>

    <a class="portal-link" routerLink="/portal/login">
      ¿Sos cliente? Ingresá al portal
    </a>
  </div>
</ion-content>
