<ion-content class="login-content">
  <div class="login-container">
    <div class="login-header">
      <div class="logo-wrapper">
        <span class="logo-cross">
          <ion-icon name="build" class="ico-wrench"></ion-icon>
          <ion-icon name="hammer" class="ico-hammer"></ion-icon>
        </span>
      </div>
      <h1>Mi Taller</h1>
      <p>Seguí el estado de tu moto</p>
    </div>

    <ion-card>
      <ion-card-content>
        <ion-item lines="full">
          <ion-label position="stacked">Correo</ion-label>
          <ion-input type="email" [(ngModel)]="email" autocomplete="email" placeholder="tu@correo.com"></ion-input>
        </ion-item>
        <ion-item lines="none">
          <ion-label position="stacked">Contraseña</ion-label>
          <ion-input [type]="verPass ? 'text' : 'password'" [(ngModel)]="password" placeholder="••••••••" (keyup.enter)="ingresar()">
            <ion-button fill="clear" slot="end" (click)="verPass = !verPass" aria-label="Mostrar contraseña">
              <ion-icon slot="icon-only" [name]="verPass ? 'eye-off-outline' : 'eye-outline'"></ion-icon>
            </ion-button>
          </ion-input>
        </ion-item>

        <ion-button expand="block" (click)="ingresar()" [disabled]="!email || !password">
          Ingresar
          <ion-icon name="arrow-forward-outline" slot="end"></ion-icon>
        </ion-button>
      </ion-card-content>
    </ion-card>

    <a class="portal-link strong" routerLink="/portal/registro">Crear una cuenta</a>
    <a class="portal-link sub" routerLink="/portal/recuperar">¿Olvidaste tu contraseña?</a>
    <a class="portal-link sub" (click)="irLoginPersonal()">¿Sos del personal? Ingresá aquí</a>
  </div>
</ion-content>
