<ion-header>
  <ion-toolbar>
    <ion-title>Mis motos</ion-title>
    <app-portal-actions slot="end"></app-portal-actions>
  </ion-toolbar>
</ion-header>

<ion-content>
  <ion-refresher slot="fixed" (ionRefresh)="cargar(); $event.target.complete()">
    <ion-refresher-content></ion-refresher-content>
  </ion-refresher>

  <div class="motos">
    <div class="intro">
      <h2>Tus motos</h2>
      <p>Registrá y administrá tus motos.</p>
    </div>

    <div *ngIf="cargando" style="display:flex;flex-direction:column;gap:10px">
      <div class="skeleton" style="height:70px;border-radius:18px"></div>
      <div class="skeleton" style="height:70px;border-radius:18px"></div>
    </div>

    <!-- Lista de motos -->
    <div class="moto-list" *ngIf="!cargando && motos.length">
      <div class="mc" *ngFor="let m of motos">
        <div class="mc-i"><ion-icon name="bicycle"></ion-icon></div>
        <div class="mc-m">
          <h4>{{ m.marca }} {{ m.modelo }}</h4>
          <p>
            <span class="placa mono">{{ m.placa }}</span>
            <span *ngIf="m.anio"> · {{ m.anio }}</span>
            <span *ngIf="m.color"> · {{ m.color }}</span>
            <span *ngIf="m.kilometraje_actual"> · {{ m.kilometraje_actual | number }} km</span>
          </p>
        </div>
        <button class="mc-e" (click)="editar(m)" title="Editar"><ion-icon name="create-outline"></ion-icon></button>
        <button class="mc-e del" (click)="eliminar(m)" title="Eliminar"><ion-icon name="trash-outline"></ion-icon></button>
      </div>
    </div>

    <div class="empty-state" *ngIf="!cargando && motos.length === 0 && !mostrarForm">
      <ion-icon name="bicycle-outline"></ion-icon>
      <p>Todavía no registraste ninguna moto.</p>
    </div>

    <!-- Botón agregar -->
    <button class="cta-o" (click)="abrirForm()" *ngIf="!mostrarForm">
      <ion-icon name="add-outline"></ion-icon> Agregar moto
    </button>

    <!-- Formulario -->
    <section class="cd" *ngIf="mostrarForm">
      <span class="lb">{{ editandoId ? 'Editar moto' : 'Registrar nueva moto' }}</span>
      <div class="fg"><label>Placa *</label><input class="upper" [(ngModel)]="nueva.placa" placeholder="MOT-123"></div>

      <div class="fg ac-field">
        <label>Marca *</label>
        <input [(ngModel)]="nueva.marca" (ngModelChange)="onMarcaInput()" placeholder="Ej: Honda" autocomplete="off">
        <div class="ac-results" *ngIf="marcasSugeridas.length">
          <button type="button" class="ac-item" *ngFor="let m of marcasSugeridas" (click)="seleccionarMarca(m)">{{ m }}</button>
        </div>
      </div>

      <div class="fg ac-field">
        <label>Modelo *</label>
        <input [(ngModel)]="nueva.modelo" (ngModelChange)="onModeloInput()" (focus)="onModeloFocus()" placeholder="Ej: CB500F" autocomplete="off">
        <div class="ac-results" *ngIf="modelosSugeridos.length">
          <button type="button" class="ac-item" *ngFor="let m of modelosSugeridos" (click)="seleccionarModelo(m)">{{ m }}</button>
        </div>
      </div>
      <div class="fg"><label>Año (opcional)</label><input type="number" inputmode="numeric" [(ngModel)]="nueva.anio" placeholder="2024"></div>
      <div class="fg"><label>Color (opcional)</label><input [(ngModel)]="nueva.color" placeholder="Ej: Rojo"></div>
      <div class="fg"><label>Kilometraje (opcional)</label><input type="number" inputmode="numeric" [(ngModel)]="nueva.kilometraje" placeholder="15000"></div>

      <button class="cta" (click)="guardar()" [disabled]="!valido || enviando">
        <ion-spinner *ngIf="enviando" name="crescent"></ion-spinner>
        {{ enviando ? 'Guardando...' : (editandoId ? '💾 Guardar cambios' : '💾 Guardar moto') }}
      </button>
      <button class="cta-o" (click)="cerrarForm()" [disabled]="enviando">Cancelar</button>
    </section>

    <div style="height:30px"></div>
  </div>
</ion-content>
