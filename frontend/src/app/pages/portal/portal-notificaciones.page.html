<ion-header>
  <ion-toolbar>
    <ion-buttons slot="start">
      <ion-back-button defaultHref="/portal/inicio" text=""></ion-back-button>
    </ion-buttons>
    <ion-title>Notificaciones</ion-title>
    <ion-buttons slot="end">
      <ion-button *ngIf="hayNoLeidas" (click)="leerTodas()" title="Marcar todas como leídas" aria-label="Marcar todas como leídas">
        <ion-icon slot="icon-only" name="checkmark-done-outline"></ion-icon>
      </ion-button>
    </ion-buttons>
  </ion-toolbar>
</ion-header>

<ion-content>
  <ion-refresher slot="fixed" (ionRefresh)="cargar($event)">
    <ion-refresher-content></ion-refresher-content>
  </ion-refresher>

  <div class="notis">
    <div *ngIf="cargando" style="display:flex;flex-direction:column;gap:10px">
      <div class="skeleton" style="height:64px;border-radius:16px"></div>
      <div class="skeleton" style="height:64px;border-radius:16px"></div>
      <div class="skeleton" style="height:64px;border-radius:16px"></div>
    </div>

    <ng-container *ngIf="!cargando && notificaciones.length">
      <div class="lista-head">
        <span class="section-label">Avances de tus servicios</span>
        <button type="button" class="limpiar" *ngIf="hayLeidas" (click)="limpiarLeidas()">Limpiar leídas</button>
      </div>

      <ion-list class="nlist" lines="none">
        <ion-item-sliding *ngFor="let n of notificaciones" #sliding>
          <ion-item class="nf-item" button detail="false" (click)="abrir(n)">
            <div class="nf" [class.nueva]="!n.leida">
              <span class="nf-ico" [ngClass]="'t-' + tono(n)"><ion-icon [name]="icono(n)"></ion-icon></span>
              <div class="nf-b">
                <span class="nf-msg">{{ n.titulo }}</span>
                <span class="nf-sub" *ngIf="n.mensaje">{{ n.mensaje }}</span>
                <span class="nf-t">{{ hace(n.created_at) }}</span>
              </div>
              <span class="nf-d" *ngIf="!n.leida" aria-label="No leída"></span>
            </div>
          </ion-item>
          <ion-item-options side="end">
            <ion-item-option color="danger" (click)="eliminar(n, sliding)">
              <ion-icon slot="icon-only" name="trash-outline"></ion-icon>
            </ion-item-option>
          </ion-item-options>
        </ion-item-sliding>
      </ion-list>

      <p class="hint-swipe">Deslizá una notificación hacia la izquierda para eliminarla.</p>
    </ng-container>

    <div class="empty" *ngIf="!cargando && !notificaciones.length">
      <ion-icon name="notifications-off-outline"></ion-icon>
      <p>No tenés notificaciones por ahora.</p>
    </div>

    <div style="height:30px"></div>
  </div>
</ion-content>
