<ion-header>
  <ion-toolbar>
    <ion-title>Ofertas</ion-title>
    <app-portal-actions slot="end"></app-portal-actions>
  </ion-toolbar>
</ion-header>

<ion-content>
  <ion-refresher slot="fixed" (ionRefresh)="cargar(); $event.target.complete()">
    <ion-refresher-content></ion-refresher-content>
  </ion-refresher>

  <div class="ofertas">
    <div class="intro">
      <h2>Ofertas</h2>
      <p>Promociones exclusivas del taller.</p>
    </div>

    <div *ngIf="cargando" style="display:flex;flex-direction:column;gap:12px">
      <div class="skeleton" style="height:150px;border-radius:20px"></div>
      <div class="skeleton" style="height:150px;border-radius:20px"></div>
    </div>

    <div class="of" *ngFor="let p of promos; let i = index" (click)="toggle(p.id)" [class.open]="abierta.has(p.id)">
      <img *ngIf="p.imagen" [src]="p.imagen" alt="" class="of-img" />
      <div class="of-img-ph" *ngIf="!p.imagen" [ngClass]="'ph-' + (i % 4)">{{ phIcono(i) }}</div>
      <div class="of-b">
        <div class="of-h">
          <strong>{{ p.titulo }}</strong>
          <span class="bg" *ngIf="p.descuento">-{{ p.descuento }}%</span>
        </div>
        <p class="of-d">{{ p.descripcion }}</p>
        <span class="of-tog">{{ abierta.has(p.id) ? 'Ver menos ▴' : 'Ver más ▾' }}</span>
      </div>
    </div>

    <div class="empty-state" *ngIf="!cargando && promos.length === 0">
      <ion-icon name="pricetags-outline"></ion-icon>
      <p>No hay ofertas por ahora. ¡Volvé pronto!</p>
    </div>

    <div style="height:30px"></div>
  </div>
</ion-content>
