<ion-header>
  <ion-toolbar>
    <ion-title>Mi Perfil</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content>
  <ion-refresher slot="fixed" (ionRefresh)="cargar(); $event.target.complete()">
    <ion-refresher-content></ion-refresher-content>
  </ion-refresher>

  <div class="perfil">
    <!-- Skeleton -->
    <div *ngIf="cargando" style="display:flex;flex-direction:column;gap:14px">
      <div class="skeleton" style="height:104px;border-radius:24px"></div>
      <div class="skeleton" style="height:220px;border-radius:24px"></div>
    </div>

    <ng-container *ngIf="!cargando">
      <!-- Cabecera -->
      <div class="profile-header">
        <div class="avatar">{{ iniciales }}</div>
        <div class="info">
          <h2>{{ cuenta.nombre }} {{ cuenta.apellido }}</h2>
          <p class="contact">{{ cuenta.email || '—' }}</p>
          <p class="contact" *ngIf="cuenta.telefono">📞 {{ cuenta.telefono }}</p>
        </div>
      </div>

      <!-- Información personal -->
      <section class="card">
        <span class="section-label">Información personal</span>
        <div class="ig"><label>Nombre</label><input [(ngModel)]="cuenta.nombre" placeholder="Tu nombre"></div>
        <div class="ig"><label>Apellido</label><input [(ngModel)]="cuenta.apellido" placeholder="Tu apellido"></div>
        <div class="ig"><label>Teléfono</label><input type="tel" [(ngModel)]="cuenta.telefono" placeholder="8888-8888"></div>
        <div class="ig"><label>Correo electrónico</label><input type="email" [(ngModel)]="cuenta.email" placeholder="correo@ejemplo.com"></div>
        <button class="cta" [disabled]="guardando" (click)="guardarCuenta()">💾 Guardar cambios</button>
      </section>

      <!-- Seguridad -->
      <section class="card">
        <span class="section-label">Seguridad</span>
        <div class="ig"><label>Contraseña actual</label><input type="password" [(ngModel)]="pass.actual" placeholder="••••••••"></div>
        <div class="ig"><label>Nueva contraseña</label><input type="password" [(ngModel)]="pass.nueva" placeholder="Mín. 6 caracteres"></div>
        <div class="ig"><label>Confirmar contraseña</label><input type="password" [(ngModel)]="pass.confirmar" placeholder="Repetí la nueva"></div>
        <button class="cta outline" [disabled]="guardandoPass" (click)="cambiarPassword()">🔑 Cambiar contraseña</button>
      </section>

      <!-- Historial de notificaciones -->
      <section class="card" *ngIf="notificaciones.length">
        <span class="section-label">📢 Historial de notificaciones</span>
        <div class="nf" *ngFor="let n of notificaciones">
          <div class="nf-b">
            <span class="nf-msg">{{ n.titulo }}</span>
            <span class="nf-t">{{ hace(n.created_at) }}</span>
          </div>
        </div>
      </section>

      <button class="cta danger" (click)="logout()">⏻ Cerrar sesión</button>
    </ng-container>

    <div style="height:90px"></div>
  </div>
</ion-content>
