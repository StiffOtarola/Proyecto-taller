<ion-header>
  <ion-toolbar color="primary">
    <ion-buttons slot="start">
      <ion-back-button defaultHref="/tabs/dashboard"></ion-back-button>
    </ion-buttons>
    <ion-title>Promociones</ion-title>
    <ion-buttons slot="end">
      <ion-button (click)="abrirForm()" *ngIf="!mostrarForm">
        <ion-icon slot="icon-only" name="add-circle-outline"></ion-icon>
      </ion-button>
    </ion-buttons>
  </ion-toolbar>
</ion-header>

<ion-content>
  <ion-refresher slot="fixed" (ionRefresh)="cargar(); $event.target.complete()">
    <ion-refresher-content></ion-refresher-content>
  </ion-refresher>

  <!-- Formulario -->
  <ion-card *ngIf="mostrarForm">
    <ion-card-header><ion-card-title>Nueva promoción</ion-card-title></ion-card-header>
    <ion-card-content>
      <ion-item>
        <ion-input label="Título" labelPlacement="floating" [(ngModel)]="nueva.titulo"
          placeholder="Ej: 2x1 en cambio de aceite"></ion-input>
      </ion-item>
      <ion-item>
        <ion-textarea label="Descripción" labelPlacement="floating" [(ngModel)]="nueva.descripcion" rows="3"></ion-textarea>
      </ion-item>
      <ion-item lines="none">
        <ion-input label="Descuento (%)" labelPlacement="floating" type="number" [(ngModel)]="nueva.descuento"></ion-input>
      </ion-item>
      <ion-button expand="block" class="ion-margin-top" (click)="crear()" [disabled]="!valido">Publicar</ion-button>
      <ion-button expand="block" fill="clear" color="medium" (click)="mostrarForm = false">Cancelar</ion-button>
    </ion-card-content>
  </ion-card>

  <div class="ion-padding ion-text-center" *ngIf="cargando" style="padding-top:20px">
    <ion-spinner name="crescent"></ion-spinner>
  </div>

  <div *ngIf="!cargando">
    <ion-card *ngFor="let p of promos" class="promo-card" [class.inactiva]="!p.activa">
      <ion-card-content>
        <div class="promo-top">
          <div class="promo-titulo">
            <ion-badge *ngIf="p.descuento" color="danger">-{{ p.descuento }}%</ion-badge>
            <strong>{{ p.titulo }}</strong>
          </div>
          <ion-toggle [checked]="!!p.activa" (ionChange)="toggle(p)"></ion-toggle>
        </div>
        <p class="promo-desc">{{ p.descripcion }}</p>
        <div class="promo-acciones">
          <span class="promo-estado" [class.on]="p.activa">{{ p.activa ? 'Activa' : 'Inactiva' }}</span>
          <ion-button fill="clear" size="small" color="danger" (click)="eliminar(p)">
            <ion-icon name="trash-outline" slot="icon-only"></ion-icon>
          </ion-button>
        </div>
      </ion-card-content>
    </ion-card>

    <div class="empty-state" *ngIf="promos.length === 0">
      <ion-icon name="pricetags-outline"></ion-icon>
      <p>Aún no hay promociones. Creá una para que tus clientes la vean en el portal.</p>
    </div>
  </div>
</ion-content>
