<ion-header>
  <ion-toolbar>
    <ion-buttons slot="start"><ion-menu-button></ion-menu-button></ion-buttons>
    <ion-title>Clientes</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content>
  <ion-refresher slot="fixed" (ionRefresh)="cargar(undefined, $event)">
    <ion-refresher-content pullingIcon="chevron-down" refreshingSpinner="crescent"></ion-refresher-content>
  </ion-refresher>

  <div class="rec">
    <ion-searchbar placeholder="Buscar cliente..." (ionInput)="buscar($event)" mode="ios" class="search"></ion-searchbar>

    <!-- Skeleton -->
    <div *ngIf="cargando" style="display:flex;flex-direction:column;gap:10px">
      <div class="skeleton" style="height:68px;border-radius:16px"></div>
      <div class="skeleton" style="height:68px;border-radius:16px"></div>
      <div class="skeleton" style="height:68px;border-radius:16px"></div>
    </div>

    <div class="cli-list" *ngIf="!cargando">
      <div class="cli-row" *ngFor="let c of clientes" (click)="abrirCliente(c)">
        <span class="avatar green">{{ iniciales(c.nombre, c.apellido) }}</span>
        <div class="cli-info">
          <strong>{{ c.nombre }} {{ c.apellido }}</strong>
          <span>{{ c.total_motos }} moto(s) · {{ c.total_citas }} cita(s)</span>
        </div>
        <div class="cli-actions">
          <button class="cli-act" (click)="llamar(c, $event)" title="Llamar"><ion-icon name="call-outline"></ion-icon></button>
          <button class="cli-act wa" (click)="whatsapp(c, $event)" title="WhatsApp"><ion-icon name="logo-whatsapp"></ion-icon></button>
        </div>
      </div>

      <div class="empty-state" *ngIf="!clientes.length">
        <ion-icon name="people-outline"></ion-icon>
        <p>No se encontraron clientes.</p>
      </div>
    </div>

    <div style="height:80px"></div>
  </div>
</ion-content>
