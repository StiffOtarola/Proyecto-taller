<ion-header>
  <ion-toolbar color="primary">
    <ion-buttons slot="start">
      <ion-back-button defaultHref="/tabs/dashboard"></ion-back-button>
    </ion-buttons>
    <ion-title>Usuarios</ion-title>
    <ion-buttons slot="end">
      <ion-button (click)="mostrarForm = !mostrarForm">
        <ion-icon slot="icon-only" name="add-circle-outline"></ion-icon>
      </ion-button>
    </ion-buttons>
  </ion-toolbar>
</ion-header>

<ion-content class="ion-padding">
  <!-- Formulario nuevo usuario -->
  <ion-card *ngIf="mostrarForm">
    <ion-card-header><ion-card-title>Nuevo usuario</ion-card-title></ion-card-header>
    <ion-card-content>
      <ion-item>
        <ion-label position="stacked">Nombre</ion-label>
        <ion-input [(ngModel)]="nuevoUsuario.nombre"></ion-input>
      </ion-item>
      <ion-item>
        <ion-label position="stacked">Email</ion-label>
        <ion-input type="email" [(ngModel)]="nuevoUsuario.email"></ion-input>
      </ion-item>
      <ion-item>
        <ion-label position="stacked">Contraseña</ion-label>
        <ion-input type="password" [(ngModel)]="nuevoUsuario.password"></ion-input>
      </ion-item>
      <ion-item>
        <ion-label position="stacked">Teléfono (opcional)</ion-label>
        <ion-input type="tel" [(ngModel)]="nuevoUsuario.telefono" placeholder="8888-8888"></ion-input>
      </ion-item>
      <ion-item>
        <ion-label position="stacked">Rol</ion-label>
        <ion-select [(ngModel)]="nuevoUsuario.rol" interface="action-sheet">
          <ion-select-option value="recepcion">Recepción</ion-select-option>
          <ion-select-option value="tecnico">Técnico</ion-select-option>
          <ion-select-option value="jefe_taller">Jefe de Taller</ion-select-option>
          <ion-select-option value="admin">Administración</ion-select-option>
          <ion-select-option value="gerencia">Gerencia</ion-select-option>
        </ion-select>
      </ion-item>
      <ion-button expand="block" class="ion-margin-top" (click)="crear()">
        <ion-icon name="person-add-outline" slot="start"></ion-icon>
        Crear usuario
      </ion-button>
    </ion-card-content>
  </ion-card>

  <!-- Lista de usuarios -->
  <div class="skeleton-wrap sk-clientes" *ngIf="cargando">
    <div class="sk-row" *ngFor="let i of [1,2,3,4]">
      <div class="skeleton sk-av"></div>
      <div class="sk-col">
        <div class="skeleton skeleton-line sk-50"></div>
        <div class="skeleton skeleton-line sk-35"></div>
      </div>
    </div>
  </div>

  <ion-list *ngIf="!cargando">
    <ion-item *ngFor="let u of usuarios">
      <ion-avatar slot="start">
        <ion-icon name="person-circle-outline" style="font-size:40px" [color]="u.activo ? 'primary' : 'medium'"></ion-icon>
      </ion-avatar>
      <ion-label>
        <h2>{{ u.nombre }}</h2>
        <p>{{ u.email }}</p>
        <p *ngIf="u.telefono"><ion-icon name="call-outline"></ion-icon> {{ u.telefono }}</p>
        <ion-badge [color]="u.activo ? 'primary' : 'medium'">{{ u.rol }}</ion-badge>
      </ion-label>
      <ion-button fill="clear" slot="end" (click)="editar(u)">
        <ion-icon slot="icon-only" name="create-outline" color="medium"></ion-icon>
      </ion-button>
      <ion-toggle slot="end" [checked]="!!u.activo" (ionChange)="toggleActivo(u)"></ion-toggle>
    </ion-item>
  </ion-list>
</ion-content>
